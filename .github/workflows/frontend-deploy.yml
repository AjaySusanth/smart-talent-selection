name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          app_location: "/frontend"
          api_location: "" # No backend API inside SWA (using ACA instead)
          output_location: "dist" # Vite output folder
        env:
          VITE_API_BASE_URL: "https://talentforge-staging-api.redstone-a7601b33.centralindia.azurecontainerapps.io/api/v1"
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}

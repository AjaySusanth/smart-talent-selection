name: Deploy Backend to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch: # Allows manual trigger if needed

permissions:
  id-token: write # Required for OIDC login
  contents: read

jobs:
  deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name talentforgestagingacr

      - name: Build and Push Docker Image
        run: |
          docker build -t talentforgestagingacr.azurecr.io/backend:${{ github.sha }} -t talentforgestagingacr.azurecr.io/backend:latest ./backend
          docker push talentforgestagingacr.azurecr.io/backend:${{ github.sha }}
          docker push talentforgestagingacr.azurecr.io/backend:latest

      - name: Deploy to Staging API Container App
        run: |
          az containerapp update \
            --name talentforge-staging-api \
            --resource-group talentforge-staging-rg \
            --image talentforgestagingacr.azurecr.io/backend:${{ github.sha }}

      - name: Deploy to Staging Worker Container App
        run: |
          az containerapp update \
            --name talentforge-staging-worker \
            --resource-group talentforge-staging-rg \
            --image talentforgestagingacr.azurecr.io/backend:${{ github.sha }}
